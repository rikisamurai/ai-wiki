            - text: ：根据最新政策，只有住在景区内的民宿，由老板协助登记，才能激活门票的多日有效功能。
        - paragraph [ref=e154]: 如果懒得自己挑，这里有几家口碑极好的选择：
        - paragraph [ref=e155]:
