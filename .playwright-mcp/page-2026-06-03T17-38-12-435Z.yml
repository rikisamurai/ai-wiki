        - list [ref=e147]:
          - listitem [ref=e148]:
            - strong [ref=e149]: 清晨的静谧
            - text: ：当大批游客还未涌入，你可以独自漫步在湿漉漉的石板路上，看炊烟从马头墙间升起。
          - listitem [ref=e150]:
            - strong [ref=e151]: 夜晚的便利
            - text: ：看完鱼灯会，别人在村外焦急打车时，你可以悠然散步回住处。
          - listitem [ref=e152]:
