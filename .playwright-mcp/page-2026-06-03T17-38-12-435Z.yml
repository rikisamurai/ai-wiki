      - generic [ref=e139]:
        - heading "住宿指南：住在呈坎，才算来过徽州" [level=1] [ref=e140]
        - paragraph [ref=e141]:
          - text: 既然你想“沉浸式体验古村生活”，那住宿必须选在
          - strong [ref=e142]: 呈坎
          - 'button "引用: Fp28vWUaWc" [ref=e143] [cursor=pointer]':
