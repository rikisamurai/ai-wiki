      - heading "🌍 徽州古村落全貌速览：不只宏村，更有真趣" [level=1] [ref=e43]
      - generic [ref=e49]: "7"
      - generic [ref=e51]:
        - paragraph [ref=e52]: 在黄山脚下，散落着许多比宏村更安静、更原味的古村落。这次我们选择的路线，避开了过度商业化的景点，串联起三个气质各异的地方：
        - list [ref=e53]:
          - listitem [ref=e54]:
            - strong [ref=e55]: 呈坎
            - text: ：行程的绝对核心。按《易经》八卦布局，是真正的“风水村”。这里不仅有保存完好的明清建筑，更有每日上演的非遗鱼灯会，是体验徽州文化和夜生活魅力的最佳地点。
          - listitem [ref=e56]:
            - strong [ref=e57]: 西溪南
            - text: ：离高铁站最近的“绿野仙踪”。大片的枫杨林沿着溪水生长，是天然的避暑氧吧和绝佳的拍照地。这里免费，商业化程度低，适合放松和玩水。
          - listitem [ref=e58]:
            - strong [ref=e59]: 徽州古城
            - text: ：一座活着的千年古城，是古徽州的府治所在地。相比宏村，这里没有拥挤的旅行团，只有本地人的真实生活气息和比比皆是的文物古迹。
      - generic [ref=e65]:
