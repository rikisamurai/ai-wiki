      - generic [ref=e184]: "5"
      - generic [ref=e186]:
        - paragraph [ref=e187]: 这家是许多游客的心头好，以高品质的服务和现代设计细节著称。老板热情周到，房间设施高端（戴森吹风机、智能家居），庭院里还有可爱的猫咪。离鱼灯表演场地仅百米之遥，位置绝佳。
        - paragraph [ref=e188]:
          - strong [ref=e189]: 瓦居客栈
          - 'button "引用: 13u4NvWMlP" [ref=e190] [cursor=pointer]':
            - img [ref=e191]
      - generic [ref=e198]:
        - paragraph [ref=e199]: 如果你钟爱传统徽派建筑，这家不会让你失望。标志性的雕花木窗是每个住客必拍的风景。老板（tree老师）因帅气和热情服务备受好评，客栈的家常菜也值得一试。
        - heading "每天怎么玩：从鱼灯会到绿野仙踪" [level=1] [ref=e200]
        - heading "Day 1：抵达徽州，初探八卦村，静待鱼灯初上" [level=2] [ref=e201]
        - paragraph [ref=e202]:
          - mark [ref=e203]:
            - text: 第一天的核心是“抵达”与“初见”。从上海的喧嚣切换到徽州的宁静，用一个下午的时间熟悉
            - strong [ref=e204]: 呈坎
            - 'button "引用: gJeZnp7ieu" [ref=e205] [cursor=pointer]':
              - img [ref=e206]
            - text: 的布局，然后在傍晚时分，迎接此行最不容错过的视觉盛宴。
      - img "地图预览" [ref=e213]
      - generic [ref=e215]:
        - heading "上午：从上海到徽州" [level=3] [ref=e216]
        - paragraph [ref=e217]:
          - text: 从上海虹桥站乘坐高铁，约2.5-3小时即可抵达
          - strong [ref=e218]: 黄山北站
          - 'button "引用: 22f0FvjXWc" [ref=e219] [cursor=pointer]':
            - img [ref=e220]
          - text: 。出站后，可以乘坐公交“游9路”（约10元）或打车（约40-60元）前往
          - strong [ref=e223]: 呈坎
          - 'button "引用: ncaZypKrWh" [ref=e224] [cursor=pointer]':
            - img [ref=e225]
          - text: ，车程约30-40分钟。你预订的民宿老板通常会提供接送服务，省去拖着行李找路的烦恼。
        - heading "午餐：品尝地道徽菜" [level=3] [ref=e228]
        - paragraph [ref=e229]: 入住后，先用一顿地道的徽菜开启旅程。
        - paragraph [ref=e230]:
          - strong [ref=e231]: 秋霞土菜馆
          - 'button "引用: 8zGAgDlpc3" [ref=e232] [cursor=pointer]':
            - img [ref=e233]
        - paragraph [ref=e236]: 这家在景区内口碑很好，以锅气十足的家常徽菜出名。老板娘很热情，饭点可能需要等位。人均70-80元，性价比不错。
        - list [ref=e237]:
          - listitem [ref=e238]:
            - strong [ref=e239]: 必点招牌：锅气十足的下饭菜
            - text: ：徽州炒粉丝是每桌必点，粉丝Q弹，配料丰富，非常入味。生炒黄牛肉用芹菜辣椒爆炒，牛肉嫩滑，咸辣适中，超级下饭。
          - listitem [ref=e240]:
            - strong [ref=e241]: 其他推荐
            - text: ：铁板毛豆腐是徽菜代表，第一次尝试可以点这道，外皮焦香，内里软嫩。
      - generic [ref=e247]:
        - paragraph [ref=e248]:
